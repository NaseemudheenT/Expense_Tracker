<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Expence Tracker</title>
<link rel="icon" type="image/png" href="logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Poppins', Arial, sans-serif;
    background: #f4f5f9;
    color: #14213D;
    padding: 20px 16px 50px;
  }
  .wrap { max-width: 440px; margin: 0 auto; }

  .logo-wrap { text-align: center; margin-bottom: 6px; }
  .logo-wrap img {
    width: 110px;
    height: auto;
    background: #fff;
    border-radius: 24px;
    padding: 10px;
    box-shadow: 0 6px 20px rgba(20,33,61,0.08);
  }

  .card {
    background: #fff;
    border-radius: 18px;
    padding: 22px;
    margin-top: 16px;
    box-shadow: 0 6px 20px rgba(20,33,61,0.07);
  }

  label { display: block; font-size: 12px; font-weight: 600; color: #8A8FA3; margin: 14px 0 6px; }
  input, select {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid #E8E9F0;
    border-radius: 10px;
    font-size: 14px;
    background: #FAFAFC;
    color: #14213D;
    font-family: inherit;
  }
  input:focus, select:focus { outline: none; border-color: #C9972C; }

  button { cursor: pointer; border: none; border-radius: 10px; font-weight: 600; font-family: inherit; }

  .btn-main {
    width: 100%;
    background: linear-gradient(135deg, #E0B65A, #C9972C);
    color: #fff;
    padding: 13px;
    font-size: 14.5px;
    margin-top: 16px;
    border-radius: 999px;
  }
  .btn-main:disabled { opacity: 0.65; cursor: not-allowed; }

  .tabs { display: flex; gap: 6px; background: #F0F1F6; padding: 4px; border-radius: 999px; }
  .tabs button {
    flex: 1; padding: 10px; background: transparent; color: #6B7280;
    border-radius: 999px; font-size: 13.5px;
  }
  .tabs button.active { background: linear-gradient(135deg, #E0B65A, #C9972C); color: #fff; }

  .msg-error { color: #C0392B; font-size: 13px; margin-top: 10px; line-height: 1.4; }
  .hidden { display: none !important; }

  .today-box {
    background: linear-gradient(135deg, #E7C25F, #C9972C 55%, #9A7218);
    color: #fff;
    border-radius: 18px;
    padding: 20px;
    margin-top: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    box-shadow: 0 10px 26px rgba(201,151,44,0.32);
  }
  .today-left .today-label { font-size: 11px; font-weight: 600; letter-spacing: 0.5px; opacity: 0.9; }
  .today-left .amount { font-size: 27px; font-weight: 700; margin: 4px 0; }
  .today-left .today-count { font-size: 12.5px; opacity: 0.95; }
  .today-date {
    background: rgba(255,255,255,0.2);
    border-radius: 12px;
    padding: 10px 14px;
    text-align: center;
    flex-shrink: 0;
    min-width: 96px;
  }
  .today-date svg { width: 18px; height: 18px; margin-bottom: 4px; }
  .today-date .date-line { font-size: 12.5px; font-weight: 700; }
  .today-date .day-line { font-size: 11px; opacity: 0.9; margin-top: 1px; }

  .top-row { display: flex; justify-content: space-between; align-items: center; }
  .logout-btn { background: #F0F1F6; color: #14213D; padding: 9px 16px; font-size: 12.5px; border-radius: 999px; }

  .expense-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #F0F1F6; gap: 10px; }
  .expense-item:last-child { border-bottom: none; }
  .expense-item .name { font-weight: 600; font-size: 14px; display: block; }
  .expense-item .time { font-size: 11.5px; color: #8A8FA3; display: block; margin-top: 2px; }
  .expense-item .right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .expense-item .amount { color: #B9842A; font-weight: 700; white-space: nowrap; font-size: 14px; }
  .del-btn { background: #FCEAEA; color: #C0392B; padding: 7px 12px; font-size: 12px; border-radius: 8px; }

  .day-title { font-size: 12px; font-weight: 700; color: #8A8FA3; letter-spacing: 0.3px; margin: 16px 0 8px; }
  .day-title:first-child { margin-top: 0; }

  .clear-btn { background: #FCEAEA; color: #C0392B; padding: 8px 14px; font-size: 12px; border-radius: 999px; }
  .row { display: flex; justify-content: space-between; align-items: center; }
  .empty-msg { color: #8A8FA3; font-size: 13.5px; margin-top: 12px; text-align: center; padding: 10px 0; }
  #loadingMsg { text-align: center; color: #8A8FA3; font-size: 13.5px; margin-top: 18px; }
</style>
</head>
<body>
<div class="wrap">

  <div class="logo-wrap"><img src="logo.png" alt="Expence Tracker" /></div>

  <p id="loadingMsg">Loading...</p>

  <!-- LOGIN / SIGNUP -->
  <div id="authCard" class="card hidden">
    <div class="tabs">
      <button type="button" id="tabLogin" class="active">Log In</button>
      <button type="button" id="tabSignup">Sign Up</button>
    </div>

    <form id="loginForm">
      <label for="loginEmail">Email</label>
      <input type="email" id="loginEmail" required />
      <label for="loginPassword">Password</label>
      <input type="password" id="loginPassword" required />
      <button type="submit" class="btn-main" id="loginBtn">Log In</button>
    </form>

    <form id="signupForm" class="hidden">
      <label for="signupName">Full Name</label>
      <input type="text" id="signupName" required />
      <label for="signupEmail">Email</label>
      <input type="email" id="signupEmail" required />
      <label for="signupPassword">Password</label>
      <input type="password" id="signupPassword" required />
      <label for="signupConfirm">Confirm Password</label>
      <input type="password" id="signupConfirm" required />
      <button type="submit" class="btn-main" id="signupBtn">Sign Up</button>
    </form>

    <p id="authMsg" class="msg-error hidden"></p>
  </div>

  <!-- MAIN APP -->
  <div id="appCard" class="hidden">

    <div class="card top-row">
      <span id="userName" style="font-weight:600;"></span>
      <button type="button" class="logout-btn" id="logoutBtn">Log Out</button>
    </div>

    <div class="today-box">
      <div class="today-left">
        <div class="today-label">TODAY'S EXPENSES</div>
        <div class="amount" id="todayAmount">0.00</div>
        <div class="today-count" id="todayCount">0 Expenses Today</div>
      </div>
      <div class="today-date">
        <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="16" rx="2" stroke="white" stroke-width="1.6"/><path d="M3 9h18M8 3v4M16 3v4" stroke="white" stroke-width="1.6" stroke-linecap="round"/></svg>
        <div class="date-line" id="todayDate">--</div>
        <div class="day-line" id="todayWeekday">--</div>
      </div>
    </div>

    <div class="card">
      <label for="currency">Currency</label>
      <select id="currency">
        <option value="INR" selected>INR (Rs.)</option>
        <option value="USD">USD ($)</option>
        <option value="EUR">EUR</option>
        <option value="GBP">GBP</option>
      </select>
      <label for="expenseName">Expense Name</label>
      <input type="text" id="expenseName" placeholder="e.g. Lunch" />
      <label for="expenseAmount">Amount</label>
      <input type="number" id="expenseAmount" placeholder="e.g. 150" min="0.01" step="0.01" />
      <p id="expenseMsg" class="msg-error hidden"></p>
      <button type="button" class="btn-main" id="addBtn">+ Add Expense</button>
    </div>

    <div class="card">
      <div class="row">
        <strong style="font-size:13px;">EXPENSE HISTORY</strong>
        <button type="button" class="clear-btn" id="clearAllBtn">Clear All</button>
      </div>
      <div id="historyDiv">
        <p class="empty-msg" id="emptyMsg">No expenses yet.</p>
      </div>
    </div>

  </div>
</div>

<!-- Firebase compat SDK: plain scripts, no module-loading restrictions -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
(function () {
  "use strict";

  // ---------- FIREBASE INIT ----------
  var firebaseConfig = {
    apiKey: "AIzaSyD6eUkcF1DR5Tj_oMNmJGHDm06XzKLGBg4",
    authDomain: "expense-tracker-5c250.firebaseapp.com",
    projectId: "expense-tracker-5c250",
    storageBucket: "expense-tracker-5c250.firebasestorage.app",
    messagingSenderId: "770528221263",
    appId: "1:770528221263:web:d85908f947ff233a07f23a",
    measurementId: "G-NGR7KC6ESL"
  };

  if (typeof firebase === "undefined") {
    document.getElementById("loadingMsg").textContent =
      "Could not load Firebase. Please check your internet connection and refresh.";
    return;
  }

  firebase.initializeApp(firebaseConfig);
  var auth = firebase.auth();
  var db = firebase.firestore();

  // Improves reliability: caches data locally so reads are faster and
  // queued writes survive brief connection drops.
  db.enablePersistence().catch(function (err) {
    console.warn("Offline persistence not enabled:", err.code || err);
  });

  auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(function (err) {
    console.error("Auth persistence error:", err);
  });

  // ---------- DOM REFERENCES ----------
  function $(id) { return document.getElementById(id); }

  var loadingMsg = $("loadingMsg");
  var authCard = $("authCard");
  var appCard = $("appCard");
  var tabLogin = $("tabLogin");
  var tabSignup = $("tabSignup");
  var loginForm = $("loginForm");
  var signupForm = $("signupForm");
  var authMsg = $("authMsg");

  var loginBtn = $("loginBtn");
  var signupBtn = $("signupBtn");
  var logoutBtn = $("logoutBtn");
  var userName = $("userName");

  var todayAmount = $("todayAmount");
  var todayCount = $("todayCount");
  var todayDate = $("todayDate");
  var todayWeekday = $("todayWeekday");

  var currencySelect = $("currency");
  var expenseNameInput = $("expenseName");
  var expenseAmountInput = $("expenseAmount");
  var expenseMsg = $("expenseMsg");
  var addBtn = $("addBtn");

  var historyDiv = $("historyDiv");
  var clearAllBtn = $("clearAllBtn");

  var currentUser = null;
  var unsubscribeListener = null;
  var cachedExpenses = [];

  // ---------- HELPERS ----------
  function showError(el, message) {
    el.textContent = message;
    el.className = "msg-error";
  }
  function hideMsg(el) {
    el.className = "msg-error hidden";
  }
  function friendlyError(err) {
    var code = (err && err.code) ? err.code : "";
    var map = {
      "auth/email-already-in-use": "That email is already registered. Try logging in instead.",
      "auth/invalid-email": "Please enter a valid email address.",
      "auth/weak-password": "Password must be at least 6 characters.",
      "auth/user-not-found": "No account found with that email.",
      "auth/wrong-password": "Incorrect password. Please try again.",
      "auth/invalid-credential": "Incorrect email or password.",
      "auth/too-many-requests": "Too many attempts. Please wait and try again.",
      "auth/network-request-failed": "Network error. Please check your connection.",
      "permission-denied": "Permission denied. Check your Firestore security rules."
    };
    return map[code] || (err && err.message) || "Something went wrong. Please try again.";
  }
  // Wraps any promise so the UI never waits forever — if it doesn't
  // resolve within the given time, the user sees a clear message
  // instead of an endless spinner.
  function withTimeout(promise, ms, timeoutMessage) {
    return new Promise(function (resolve, reject) {
      var timer = setTimeout(function () {
        reject(new Error(timeoutMessage));
      }, ms);
      promise.then(
        function (result) { clearTimeout(timer); resolve(result); },
        function (err) { clearTimeout(timer); reject(err); }
      );
    });
  }
  function currencySymbol(code) {
    if (code === "INR") return "Rs. ";
    if (code === "USD") return "$";
    if (code === "EUR") return "EUR ";
    if (code === "GBP") return "GBP ";
    return code + " ";
  }
  function formatAmount(amount, code) {
    return currencySymbol(code) + Number(amount).toFixed(2);
  }
  function sameDay(a, b) {
    return a.getFullYear() === b.getFullYear() &&
           a.getMonth() === b.getMonth() &&
           a.getDate() === b.getDate();
  }
  function escapeHtml(text) {
    var div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }

  // Firebase has loaded and initialized successfully — reveal the auth screen.
  loadingMsg.classList.add("hidden");
  authCard.classList.remove("hidden");

  // ---------- TAB SWITCHING ----------
  tabLogin.addEventListener("click", function () {
    tabLogin.classList.add("active");
    tabSignup.classList.remove("active");
    loginForm.classList.remove("hidden");
    signupForm.classList.add("hidden");
    hideMsg(authMsg);
  });
  tabSignup.addEventListener("click", function () {
    tabSignup.classList.add("active");
    tabLogin.classList.remove("active");
    signupForm.classList.remove("hidden");
    loginForm.classList.add("hidden");
    hideMsg(authMsg);
  });

  // ---------- SIGN UP ----------
  signupForm.addEventListener("submit", function (e) {
    e.preventDefault();
    hideMsg(authMsg);

    var name = $("signupName").value.trim();
    var email = $("signupEmail").value.trim();
    var pass = $("signupPassword").value;
    var confirmPass = $("signupConfirm").value;

    if (!name) { showError(authMsg, "Please enter your full name."); return; }
    if (!email) { showError(authMsg, "Please enter your email."); return; }
    if (pass.length < 6) { showError(authMsg, "Password must be at least 6 characters."); return; }
    if (pass !== confirmPass) { showError(authMsg, "Passwords do not match."); return; }

    signupBtn.disabled = true;
    signupBtn.textContent = "Creating account...";

    withTimeout(
      auth.createUserWithEmailAndPassword(email, pass).then(function (credential) {
        return credential.user.updateProfile({ displayName: name });
      }),
      12000,
      "This is taking longer than expected. Please check your connection and try again."
    )
      .then(function () {
        signupForm.reset();
        // onAuthStateChanged below takes over from here automatically
      })
      .catch(function (err) {
        console.error("Signup error:", err);
        showError(authMsg, friendlyError(err));
      })
      .finally(function () {
        signupBtn.disabled = false;
        signupBtn.textContent = "Sign Up";
      });
  });

  // ---------- LOG IN ----------
  loginForm.addEventListener("submit", function (e) {
    e.preventDefault();
    hideMsg(authMsg);

    var email = $("loginEmail").value.trim();
    var pass = $("loginPassword").value;

    if (!email || !pass) { showError(authMsg, "Please enter email and password."); return; }

    loginBtn.disabled = true;
    loginBtn.textContent = "Logging in...";

    withTimeout(
      auth.signInWithEmailAndPassword(email, pass),
      12000,
      "This is taking longer than expected. Please check your connection and try again."
    )
      .then(function () {
        loginForm.reset();
      })
      .catch(function (err) {
        console.error("Login error:", err);
        showError(authMsg, friendlyError(err));
      })
      .finally(function () {
        loginBtn.disabled = false;
        loginBtn.textContent = "Log In";
      });
  });

  // ---------- LOG OUT ----------
  logoutBtn.addEventListener("click", function () {
    auth.signOut().catch(function (err) {
      console.error("Logout error:", err);
      alert("Could not log out: " + friendlyError(err));
    });
  });

  // ---------- AUTH STATE — runs on load and after every login/logout ----------
  auth.onAuthStateChanged(function (user) {
    if (user) {
      currentUser = user;
      authCard.classList.add("hidden");
      appCard.classList.remove("hidden");
      userName.textContent = user.displayName || user.email || "User";
      subscribeToExpenses(user.uid);
    } else {
      currentUser = null;
      if (unsubscribeListener) { unsubscribeListener(); unsubscribeListener = null; }
      cachedExpenses = [];
      appCard.classList.add("hidden");
      authCard.classList.remove("hidden");
    }
  });

  // ---------- ADD EXPENSE (timeout-protected — never hangs forever) ----------
  addBtn.addEventListener("click", function () {
    hideMsg(expenseMsg);

    if (!currentUser) {
      showError(expenseMsg, "You are not logged in. Please refresh and log in again.");
      return;
    }

    var name = expenseNameInput.value.trim();
    var amountValue = expenseAmountInput.value;
    var currencyCode = currencySelect.value;
    var amount = parseFloat(amountValue);

    // VALIDATION — stop immediately if invalid
    if (!name) {
      showError(expenseMsg, "Please enter an expense name.");
      expenseNameInput.focus();
      return;
    }
    if (amountValue === "" || isNaN(amount) || amount <= 0) {
      showError(expenseMsg, "Please enter a valid amount greater than 0.");
      expenseAmountInput.focus();
      return;
    }

    addBtn.disabled = true;
    addBtn.textContent = "Saving...";

    var newExpenseRef = db.collection("users").doc(currentUser.uid).collection("expenses").doc();

    var savePromise = newExpenseRef.set({
      name: name,
      amount: amount,
      currency: currencyCode,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    withTimeout(savePromise, 10000, "Taking longer than expected. Check your connection — it may still save in the background.")
      .then(function () {
        expenseNameInput.value = "";
        expenseAmountInput.value = "";
        expenseNameInput.focus();
      })
      .catch(function (err) {
        console.error("Add expense error:", err);
        showError(expenseMsg, friendlyError(err));
      })
      .finally(function () {
        addBtn.disabled = false;
        addBtn.textContent = "+ Add Expense";
      });
  });

  // Allow pressing Enter inside the amount field to submit
  expenseAmountInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter") {
      e.preventDefault();
      addBtn.click();
    }
  });

  // ---------- REAL-TIME LISTENER ----------
  function subscribeToExpenses(uid) {
    if (unsubscribeListener) { unsubscribeListener(); }

    var expensesRef = db.collection("users").doc(uid).collection("expenses").orderBy("createdAt", "desc");

    unsubscribeListener = expensesRef.onSnapshot(function (snapshot) {
      var list = [];
      snapshot.forEach(function (docSnap) {
        var data = docSnap.data();
        var amount = Number(data.amount);
        var name = (typeof data.name === "string") ? data.name : "";

        // DATA INTEGRITY — skip corrupted records instead of crashing
        if (!name || isNaN(amount) || amount <= 0) { return; }

        var date;
        if (data.createdAt && typeof data.createdAt.toDate === "function") {
          date = data.createdAt.toDate();
        } else {
          date = new Date();
        }

        list.push({
          id: docSnap.id,
          name: name,
          amount: amount,
          currency: data.currency || "INR",
          date: date
        });
      });

      renderDashboard(list);
    }, function (err) {
      console.error("Listener error:", err);
      historyDiv.innerHTML = "";
      var p = document.createElement("p");
      p.className = "msg-error";
      p.textContent = "Could not load expenses: " + friendlyError(err);
      historyDiv.appendChild(p);
    });
  }

  // ---------- RECALCULATE + RENDER ----------
  function renderDashboard(list) {
    cachedExpenses = list;
    var now = new Date();

    // Today's date display
    todayDate.textContent = now.toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" });
    todayWeekday.textContent = now.toLocaleDateString("en-US", { weekday: "long" });

    // Today's total and count — always computed fresh from the list,
    // so it automatically resets to zero the moment the date changes.
    var todaysExpenses = [];
    for (var i = 0; i < list.length; i++) {
      if (sameDay(list[i].date, now)) { todaysExpenses.push(list[i]); }
    }
    var todayTotal = 0;
    for (var j = 0; j < todaysExpenses.length; j++) { todayTotal += todaysExpenses[j].amount; }

    todayAmount.textContent = formatAmount(todayTotal, "INR");
    todayCount.textContent = todaysExpenses.length + " Expense" + (todaysExpenses.length === 1 ? "" : "s") + " Today";

    // Group into Today / Yesterday / Older — past days stay saved permanently
    var yesterday = new Date(now);
    yesterday.setDate(now.getDate() - 1);

    var groupToday = [];
    var groupYesterday = [];
    var groupOlder = [];

    for (var k = 0; k < list.length; k++) {
      var exp = list[k];
      if (sameDay(exp.date, now)) { groupToday.push(exp); }
      else if (sameDay(exp.date, yesterday)) { groupYesterday.push(exp); }
      else { groupOlder.push(exp); }
    }

    historyDiv.innerHTML = "";

    if (list.length === 0) {
      var emptyP = document.createElement("p");
      emptyP.className = "empty-msg";
      emptyP.textContent = "No expenses yet.";
      historyDiv.appendChild(emptyP);
      return;
    }

    renderGroup("TODAY", groupToday);
    renderGroup("YESTERDAY", groupYesterday);
    renderGroup("OLDER", groupOlder);
  }

  function renderGroup(title, items) {
    if (items.length === 0) { return; }

    var total = 0;
    for (var i = 0; i < items.length; i++) { total += items[i].amount; }

    var titleEl = document.createElement("div");
    titleEl.className = "day-title";
    titleEl.textContent = title + " \u2014 Total: " + formatAmount(total, "INR") + " (" + items.length + ")";
    historyDiv.appendChild(titleEl);

    for (var j = 0; j < items.length; j++) {
      var exp = items[j];
      var row = document.createElement("div");
      row.className = "expense-item";

      var infoSpan = document.createElement("span");
      var timeText = exp.date.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
      infoSpan.innerHTML =
        '<span class="name">' + escapeHtml(exp.name) + "</span>" +
        '<span class="time">' + timeText + "</span>";

      var rightSpan = document.createElement("span");
      rightSpan.className = "right";

      var amountSpan = document.createElement("span");
      amountSpan.className = "amount";
      amountSpan.textContent = formatAmount(exp.amount, exp.currency);

      var delBtn = document.createElement("button");
      delBtn.type = "button";
      delBtn.className = "del-btn";
      delBtn.textContent = "Delete";
      delBtn.setAttribute("data-id", exp.id);
      delBtn.setAttribute("data-name", exp.name);

      rightSpan.appendChild(amountSpan);
      rightSpan.appendChild(delBtn);
      row.appendChild(infoSpan);
      row.appendChild(rightSpan);
      historyDiv.appendChild(row);
    }
  }

  // ---------- DELETE SINGLE (event delegation — works for every rendered row) ----------
  historyDiv.addEventListener("click", function (e) {
    var btn = e.target.closest(".del-btn");
    if (!btn) { return; }
    var id = btn.getAttribute("data-id");
    var name = btn.getAttribute("data-name");
    if (!confirm('Delete "' + name + '"? This cannot be undone.')) { return; }

    db.collection("users").doc(currentUser.uid).collection("expenses").doc(id).delete()
      .catch(function (err) {
        console.error("Delete error:", err);
        alert("Could not delete expense: " + friendlyError(err));
      });
  });

  // ---------- CLEAR ALL ----------
  clearAllBtn.addEventListener("click", function () {
    if (cachedExpenses.length === 0) {
      alert("There's nothing to clear.");
      return;
    }
    if (!confirm("Delete all " + cachedExpenses.length + " expense(s)? This cannot be undone.")) { return; }

    var batch = db.batch();
    for (var i = 0; i < cachedExpenses.length; i++) {
      var ref = db.collection("users").doc(currentUser.uid).collection("expenses").doc(cachedExpenses[i].id);
      batch.delete(ref);
    }
    batch.commit().catch(function (err) {
      console.error("Clear all error:", err);
      alert("Could not clear expenses: " + friendlyError(err));
    });
  });

  // ---------- AUTOMATIC DAY ROLLOVER ----------
  // Re-renders from the same cached data on a timer and whenever the tab
  // becomes visible again, so if the app is left open past midnight,
  // "Today" automatically becomes empty/fresh and the previous day's
  // expenses automatically shift into "Yesterday" — without needing a
  // new expense to be added or the page to be manually refreshed.
  setInterval(function () {
    if (currentUser) { renderDashboard(cachedExpenses); }
  }, 60000);

  document.addEventListener("visibilitychange", function () {
    if (document.visibilityState === "visible" && currentUser) {
      renderDashboard(cachedExpenses);
    }
  });

})();
</script>
</body>
</html>
