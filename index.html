<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Expense Tracker — Luxury</title>
  <link rel="icon" href="logo.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="logo.png" alt="logo" class="logo" />
      <h1>Expense Tracker</h1>
    </div>
    <div id="user-area" class="user-area">
      <div id="user-name" class="user-name"></div>
      <button id="btn-logout" class="btn btn-ghost">Logout</button>
    </div>
  </header>

  <main class="container">
    <section id="auth-section" class="card auth-card">
      <div class="tabs">
        <button id="show-login" class="tab active">Login</button>
        <button id="show-signup" class="tab">Sign up</button>
      </div>
      <div id="auth-forms">
        <form id="login-form" class="form">
          <label>Email<input type="email" id="login-email" required/></label>
          <label>Password<input type="password" id="login-password" required/></label>
          <div class="form-actions">
            <button type="submit" class="btn">Login</button>
          </div>
          <div id="login-error" class="form-error"></div>
        </form>

        <form id="signup-form" class="form hidden">
          <label>Full Name<input type="text" id="signup-name" required/></label>
          <label>Email<input type="email" id="signup-email" required/></label>
          <label>Password<input type="password" id="signup-password" required minlength="6"/></label>
          <label>Confirm Password<input type="password" id="signup-password-confirm" required minlength="6"/></label>
          <div class="form-actions">
            <button type="submit" class="btn">Create account</button>
          </div>
          <div id="signup-error" class="form-error"></div>
        </form>
      </div>
    </section>

    <section id="app" class="hidden">
      <div class="grid">
        <aside class="card sidebar">
          <div class="profile">
            <img src="logo.png" alt="avatar"/>
            <div>
              <div id="profile-name" class="profile-name"></div>
              <div id="profile-email" class="profile-email"></div>
            </div>
          </div>

          <div class="stats card mini">
            <h3>Today</h3>
            <div class="stat-row">
              <div>
                <div class="muted">Total</div>
                <div id="today-total" class="big">$0.00</div>
              </div>
              <div>
                <div class="muted">Count</div>
                <div id="today-count" class="big">0</div>
              </div>
            </div>
          </div>

          <div class="actions">
            <button id="backup-btn" class="btn btn-outline">Backup Data</button>
            <button id="restore-btn" class="btn btn-outline">Restore Backup</button>
            <button id="clear-all-btn" class="btn btn-danger">Clear All Expenses</button>
          </div>
        </aside>

        <section class="main-card">
          <div class="card">
            <h2>Add Expense</h2>
            <form id="expense-form" class="form-inline">
              <input id="expense-name" placeholder="Expense name" required />
              <input id="expense-amount" placeholder="Amount" type="number" step="0.01" min="0.01" required />
              <select id="expense-currency">
                <option value="USD">USD</option>
                <option value="EUR">EUR</option>
                <option value="GBP">GBP</option>
                <option value="INR">INR</option>
              </select>
              <button class="btn" id="add-expense">Add</button>
            </form>
            <div id="expense-error" class="form-error"></div>
          </div>

          <div class="card">
            <h2>History</h2>
            <div id="history">
              <div class="section-group">
                <h3>Today</h3>
                <ul id="list-today" class="list"></ul>
              </div>
              <div class="section-group">
                <h3>Yesterday</h3>
                <ul id="list-yesterday" class="list"></ul>
              </div>
              <div class="section-group">
                <h3>Older</h3>
                <ul id="list-older" class="list"></ul>
              </div>
            </div>
          </div>
        </section>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div>© <span id="brand-year"></span> Expense Tracker. Built with care.</div>
    <div class="muted">White · Gold accents · Dark navy text</div>
  </footer>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
