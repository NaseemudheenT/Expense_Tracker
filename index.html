<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expence Tracker</title>
  <meta name="description" content="Track your daily expenses easily and securely." />
  <link rel="icon" href="logo.png" />
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <!-- AUTH SCREEN -->
  <section id="authScreen" class="auth-screen">
    <div class="auth-card">
      <img src="logo.png" alt="Expence Tracker" class="auth-logo" />
      <div class="auth-tabs">
        <button id="tabLogin" class="auth-tab active">Login</button>
        <button id="tabSignup" class="auth-tab">Sign Up</button>
      </div>

      <form id="loginForm" class="auth-form">
        <input type="email" id="loginEmail" placeholder="Email" required />
        <input type="password" id="loginPassword" placeholder="Password" required />
        <button type="submit" class="btn-primary">Login</button>
        <p id="loginError" class="form-error"></p>
      </form>

      <form id="signupForm" class="auth-form hidden">
        <input type="text" id="signupName" placeholder="Full Name" required />
        <input type="email" id="signupEmail" placeholder="Email" required />
        <input type="password" id="signupPassword" placeholder="Password (min 6 chars)" required minlength="6" />
        <input type="password" id="signupConfirm" placeholder="Confirm Password" required minlength="6" />
        <button type="submit" class="btn-primary">Create Account</button>
        <p id="signupError" class="form-error"></p>
      </form>
    </div>
  </section>

  <!-- APP -->
  <main id="app" class="app hidden">
    <header class="app-header">
      <button class="icon-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
      <div class="brand">
        <img src="logo.png" alt="logo" />
        <div>
          <h1>EXPENCE</h1>
          <span>TRACKER</span>
        </div>
      </div>
      <button class="icon-btn" id="logoutBtn" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
    </header>

    <p class="welcome">Welcome, <span id="userName">User</span> 👋</p>

    <!-- Today's summary -->
    <section class="summary-card">
      <div class="summary-left">
        <p class="label">TODAY'S EXPENSES</p>
        <h2 id="todayTotal">₹ 0.00</h2>
        <p class="sub"><i class="fas fa-wallet"></i> <span id="todayCount">0</span> Expenses Today</p>
      </div>
      <div class="summary-right">
        <i class="far fa-calendar-alt"></i>
        <p id="todayDate">--</p>
        <span id="todayDay">--</span>
      </div>
    </section>

    <!-- Add expense -->
    <section class="card">
      <h3><i class="far fa-edit"></i> ADD NEW EXPENSE</h3>
      <form id="expenseForm" class="expense-form">
        <div class="field">
          <label>Currency</label>
          <select id="currency">
            <option value="₹">₹ INR</option>
            <option value="$">$ USD</option>
            <option value="€">€ EUR</option>
            <option value="£">£ GBP</option>
          </select>
        </div>
        <div class="field grow">
          <label>Expense Name</label>
          <input type="text" id="expenseName" placeholder="Enter expense name" required />
        </div>
        <div class="field">
          <label>Amount</label>
          <input type="number" id="expenseAmount" placeholder="Enter amount" min="0" step="0.01" required />
        </div>
        <button type="submit" class="btn-primary full"><i class="fas fa-plus"></i> Add Expense</button>
      </form>
    </section>

    <!-- History -->
    <section class="card">
      <div class="history-header">
        <h3><i class="fas fa-list"></i> EXPENSE HISTORY</h3>
        <button id="clearAllBtn" class="btn-clear"><i class="fas fa-trash"></i> Clear All</button>
      </div>
      <input type="text" id="searchInput" class="search" placeholder="🔍 Search expenses..." />
      <div id="historyList" class="history-list">
        <p class="empty">No expenses yet. Add your first one!</p>
      </div>
    </section>
  </main>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
